# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

tasks:
  start:
    cmds:
      - npm run build
      - go run ./cmd/granite

  client:
    cmds:
      - npm run dev

  install:
    cmds:
      - cmd: go install ./cmd/granite
      - task: install-darwin
      - task: install-windows

  install-darwin:
    platforms: [darwin]
    cmds:
      - task: build
      - cmd: mkdir -p ~/Applications
      - cmd: rm -rf ~/Applications/Granite.app
      - cmd: mv app/build/bin/Granite.app ~/Applications/

  install-windows:
    platforms: [windows]
    cmds:
      # Task runs cmds through its built-in POSIX shell (mvdan/sh) even on
      # Windows, so env vars expand as $VAR, not %VAR%.
      - task: build
      - cmd: mkdir -p "$LOCALAPPDATA/Programs"
      - cmd: rm -f "$LOCALAPPDATA/Programs/Granite.exe"
      - cmd: mv app/build/bin/Granite.exe "$LOCALAPPDATA/Programs/"

  build:
    desc: Build the desktop app for this platform (Granite.app / Granite.exe); all resources are generated from app/appicon.png
    cmds:
      - go tool appbundle -name Granite -id com.adrianliechti.granite -description "Granite - Database and Object-Storage Browser" -company "Adrian Liechti" -copyright "© Adrian Liechti" -package ./app

  ui:
    desc: Build the web UI assets
    cmds:
      - npm install
      - npm run build

  release:app:
    desc: Release the macOS desktop app + Homebrew cask (macOS only; needs GITHUB_TOKEN)
    cmds:
      # --skip=validate: skip git-state checks so snapshot/dry runs work from a dirty tree.
      - goreleaser release --clean --skip=validate -f .goreleaser.app.yml

  release:
    desc: Full release — the desktop app, on the current git tag
    cmds:
      - task: release:app
