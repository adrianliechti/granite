# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

tasks:
  build:
    cmds:
      - npm run build
      - go build -o bin/granite ./cmd/granite

  run:
    cmds:
      - npm run build
      - go run ./cmd/granite

  install:
    cmds:
      - npm run build
      - go install ./cmd/granite

  run:app:
    desc: Build and launch the Wails desktop app
    cmds:
      - npm run build
      - cd app && go run github.com/wailsapp/wails/v2/cmd/wails@v2.12.0 build -clean
      - open -n "app/build/bin/Granite.app"

  install:app:
    desc: Build and install the desktop app to /Applications (macOS)
    cmds:
      - npm run build
      - cd app && go run github.com/wailsapp/wails/v2/cmd/wails@v2.12.0 build -clean
      - rm -rf "/Applications/Granite.app"
      - cp -R "app/build/bin/Granite.app" "/Applications/Granite.app"

  release:app:
    desc: Release the macOS desktop app + Homebrew cask (macOS only; needs GITHUB_TOKEN)
    cmds:
      # --skip=validate: `wails build` may regenerate tracked bindings, dirtying the tree.
      - goreleaser release --clean --skip=validate -f .goreleaser.app.yml
